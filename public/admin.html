<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processor Console — Transfado</title>
<script>try{var t=localStorage.getItem('tf_theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1FE08A">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
  .pill-pierson { font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--gold); background:rgba(251,191,36,.12); border:1px solid rgba(251,191,36,.28); padding:3px 10px; border-radius:999px; }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <a href="/" class="brand"><span class="brand-mark" id="mark"></span> Trans<small>fado</small></a>
    <div style="padding:0 8px 10px"><span class="pill-pierson" data-i18n="admin.console">Processor Console</span></div>
    <a class="side-link" data-page="overview"><span class="ico">▣</span><span data-i18n="dash.overview">Overview</span></a>
    <a class="side-link" data-page="clients"><span class="ico">👥</span><span data-i18n="admin.clients">Clients</span></a>
    <a class="side-link" data-page="plans"><span class="ico">🎚️</span><span data-i18n="admin.plans">Fee Plans</span></a>
    <a class="side-link" data-page="coupons"><span class="ico">🏷️</span><span data-i18n="admin.coupons">Coupons</span></a>
    <a class="side-link" data-page="transactions"><span class="ico">🧾</span><span data-i18n="admin.transactions">Transactions</span></a>
    <div class="side-sep"></div>
    <a class="side-link" data-page="settings"><span class="ico">⚙</span><span data-i18n="admin.settings">Settings</span></a>
    <div class="side-foot">
      <div class="side-sep"></div>
      <div class="side-account" id="side-account">Pierson Digital</div>
      <a class="side-link" id="logout-btn"><span class="ico">→</span><span data-i18n="dash.signout">Sign out</span></a>
      <div class="side-account" style="padding-top:6px;font-size:11.5px">
        <a href="/legal/terms" target="_blank" style="color:var(--text-dim)">Terms</a> ·
        <a href="/legal/privacy" target="_blank" style="color:var(--text-dim)">Privacy</a> ·
        <a href="/compliance" target="_blank" style="color:var(--text-dim)">Compliance</a>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Overview</h1>
      <div class="row" style="align-items:center;gap:10px">
        <button class="icon-btn" id="cmdk-btn" title="Search (⌘K)" aria-label="Command palette"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg></button>
        <span id="topctl"></span>
        <button class="btn btn-gold btn-sm" id="run-billing"><span data-i18n="admin.runBilling">Run billing</span></button>
      </div>
    </div>
    <div class="content">
      <section class="page" id="page-overview"></section>
      <section class="page" id="page-clients"></section>
      <section class="page" id="page-plans"></section>
      <section class="page" id="page-coupons"></section>
      <section class="page" id="page-transactions"></section>
      <section class="page" id="page-settings"></section>
    </div>
  </div>
</div>
<script src="/js/common.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
