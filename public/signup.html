<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Transfado</title>
<script>try{var t=localStorage.getItem('tf_theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
  .auth-wrap { min-height:100vh; display:grid; grid-template-columns:1fr 1fr; }
  .auth-aside { background: var(--surface); border-right:1px solid var(--border); padding:48px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
  .auth-aside h2 { font-size:38px; line-height:1.05; margin-top:30px; letter-spacing:-.02em; }
  .auth-aside ul { list-style:none; margin-top:24px; display:flex; flex-direction:column; gap:12px; }
  .auth-aside li { color: var(--text); display:flex; gap:10px; align-items:center; }
  .auth-aside li b { color: var(--positive-text); }
  .auth-main { display:flex; align-items:center; justify-content:center; padding:40px 24px; position:relative; }
  .auth-card { width:100%; max-width:440px; }
  .auth-card h1 { font-size:32px; margin-bottom:6px; }
  .auth-top { position:absolute; top:20px; right:24px; }
  @media (max-width:820px){ .auth-wrap{grid-template-columns:1fr;} .auth-aside{display:none;} }
</style>
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-aside">
    <div class="aurora"><span class="a1"></span><span class="a2"></span></div>
    <a href="/" class="brand" style="position:relative;z-index:2"><span class="brand-mark" id="mark"></span> Trans<small>fado</small></a>
    <div style="position:relative;z-index:2">
      <h2><span data-i18n="auth.startTitle1">Start processing</span><br><span class="grad-text" data-i18n="auth.startTitle2">in one minute.</span></h2>
      <ul>
        <li>✓ <b data-i18n="auth.startPoint1">Instant sandbox account</b></li>
        <li>✓ <b data-i18n="auth.startPoint2">Your own API keys & payment links</b></li>
        <li>✓ <b data-i18n="auth.startPoint3">No contracts, cancel anytime</b></li>
      </ul>
    </div>
    <p class="small dim" style="position:relative;z-index:2">© 2026 Transfado</p>
  </aside>
  <main class="auth-main">
    <div class="auth-top" id="topctl"></div>
    <div class="auth-card">
      <h1 data-i18n="auth.createTitle">Create your account</h1>
      <p class="muted mb24" data-i18n="auth.createSub">Open a Transfado merchant account.</p>
      <form id="signup-form">
        <label class="field"><span data-i18n="auth.business">Business name</span>
          <input type="text" name="businessName" required placeholder="Acme Co."></label>
        <div class="field-row">
          <label class="field"><span data-i18n="auth.yourName">Your name</span>
            <input type="text" name="contactName" placeholder="Jane Doe"></label>
          <label class="field"><span data-i18n="auth.website">Website</span>
            <input type="text" name="website" placeholder="acme.com"></label>
        </div>
        <label class="field"><span data-i18n="common.email">Email</span>
          <input type="email" name="email" autocomplete="email" required placeholder="you@business.com"></label>
        <label class="field"><span data-i18n="auth.password">Password</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters"></label>
        <label style="display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--text-muted);margin-bottom:16px;cursor:pointer">
          <input type="checkbox" name="consent" required style="width:auto;margin-top:3px;flex:none">
          <span id="consent-text">I agree to the <a href="/legal/terms" target="_blank">Terms of Service</a> and <a href="/legal/privacy" target="_blank">Privacy Policy</a>.</span>
        </label>
        <div class="form-error" id="err"></div>
        <button class="btn btn-primary btn-block btn-lg" type="submit" id="submit" data-i18n="auth.create">Create account</button>
      </form>
      <p class="small muted mt24 center"><span data-i18n="auth.haveAccount">Already have an account?</span> <a href="/login" data-i18n="auth.signin">Sign in →</a></p>
    </div>
  </main>
</div>
<script src="/js/common.js"></script>
<script>
(function () {
  const { $, api, brandMark, topControls, applyI18n, t } = window.PP;
  $('#mark').innerHTML = brandMark();
  function consentText() {
    $('#consent-text').innerHTML = t('auth.consent')
      .replace('{terms}', '<a href="/legal/terms" target="_blank">Terms of Service</a>')
      .replace('{privacy}', '<a href="/legal/privacy" target="_blank">Privacy Policy</a>');
  }
  window.PP.ready.then(() => { $('#topctl').appendChild(topControls()); applyI18n(document); consentText(); });
  document.addEventListener('localechange', () => { applyI18n(document); consentText(); });
  PP.getSession().then((s) => { if (s.authenticated) location.href = s.user.role === 'admin' ? '/admin' : '/dashboard'; });
  const form = $('#signup-form'), err = $('#err'), submit = $('#submit');
  form.addEventListener('submit', async (e) => {
    e.preventDefault(); err.textContent = ''; submit.disabled = true; submit.innerHTML = '<span class="spinner"></span>';
    try {
      const body = { businessName: form.businessName.value, contactName: form.contactName.value, website: form.website.value, email: form.email.value, password: form.password.value };
      const data = await api('/auth/signup', { method: 'POST', body });
      location.href = data.redirect || '/dashboard';
    } catch (ex) { err.textContent = ex.message; submit.disabled = false; submit.textContent = t('auth.create'); }
  });
})();
</script>
</body>
</html>
