<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Pierson Pay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
<style>
  .auth-wrap { min-height: 100vh; display:grid; grid-template-columns: 1fr 1fr; }
  .auth-aside { background: var(--navy2); border-right:1px solid var(--line); padding: 48px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden; }
  .auth-aside::before { content:""; position:absolute; width:460px;height:460px; right:-180px; top:-160px; background: radial-gradient(circle, rgba(74,222,128,0.18), transparent 65%); }
  .auth-aside h2 { font-size: 38px; line-height:1.05; margin-top: 30px; }
  .auth-aside .grad { background: var(--grad-gold); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .auth-aside ul { list-style:none; margin-top:24px; display:flex; flex-direction:column; gap:12px; }
  .auth-aside li { color: var(--off); display:flex; gap:10px; align-items:center; }
  .auth-aside li b { color: var(--green-light); }
  .auth-main { display:flex; align-items:center; justify-content:center; padding: 40px 24px; }
  .auth-card { width:100%; max-width: 440px; }
  .auth-card h1 { font-size: 32px; margin-bottom: 6px; }
  @media (max-width: 820px){ .auth-wrap{grid-template-columns:1fr;} .auth-aside{display:none;} }
</style>
</head>
<body>
<div class="auth-wrap">
  <aside class="auth-aside">
    <a href="/" class="brand"><span class="brand-mark">P</span> Pierson<small>Pay</small></a>
    <div>
      <h2>Start processing<br>in <span class="grad">one minute.</span></h2>
      <ul>
        <li>✓ Instant sandbox account</li>
        <li>✓ Your own <b>API keys</b> &amp; payment links</li>
        <li>✓ No contracts, cancel anytime</li>
      </ul>
    </div>
    <p class="small dim">A product of Pierson Digital</p>
  </aside>
  <main class="auth-main">
    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="muted mb24">Open a Pierson Pay merchant account.</p>
      <form id="signup-form">
        <label class="field"><span>Business name</span>
          <input type="text" name="businessName" required placeholder="Acme Co."></label>
        <div class="field-row">
          <label class="field"><span>Your name</span>
            <input type="text" name="contactName" placeholder="Jane Doe"></label>
          <label class="field"><span>Website <span class="dim">(optional)</span></span>
            <input type="text" name="website" placeholder="acme.com"></label>
        </div>
        <label class="field"><span>Email</span>
          <input type="email" name="email" autocomplete="email" required placeholder="you@business.com"></label>
        <label class="field"><span>Password</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="6" placeholder="At least 6 characters"></label>
        <label style="display:flex;gap:10px;align-items:flex-start;font-size:13.5px;color:var(--muted);margin-bottom:16px;cursor:pointer">
          <input type="checkbox" name="consent" required style="width:auto;margin-top:3px;flex:none">
          <span>I agree to the <a href="/legal/terms" target="_blank">Terms of Service</a> and <a href="/legal/privacy" target="_blank">Privacy Policy</a>.</span>
        </label>
        <div class="form-error" id="err"></div>
        <button class="btn btn-primary btn-block btn-lg" type="submit" id="submit">Create account</button>
      </form>
      <p class="small muted mt24 center">Already have an account? <a href="/login">Sign in →</a></p>
    </div>
  </main>
</div>
<script src="/js/common.js"></script>
<script>
(function () {
  const { api } = window.PP;
  const form = document.getElementById('signup-form');
  const err = document.getElementById('err');
  const submit = document.getElementById('submit');
  PP.getSession().then(s => { if (s.authenticated) location.href = s.user.role === 'admin' ? '/admin' : '/dashboard'; });
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.textContent = '';
    submit.disabled = true; submit.textContent = 'Creating…';
    try {
      const body = {
        businessName: form.businessName.value,
        contactName: form.contactName.value,
        website: form.website.value,
        email: form.email.value,
        password: form.password.value,
      };
      const data = await api('/auth/signup', { method: 'POST', body });
      location.href = data.redirect || '/dashboard';
    } catch (ex) {
      err.textContent = ex.message;
      submit.disabled = false; submit.textContent = 'Create account';
    }
  });
})();
</script>
</body>
</html>
