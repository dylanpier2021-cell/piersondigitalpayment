<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Transfado</title>
<script>try{var t=localStorage.getItem('tf_theme')||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark');document.documentElement.setAttribute('data-theme',t)}catch(e){document.documentElement.setAttribute('data-theme','dark')}</script>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1FE08A">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <a href="/" class="brand"><span class="brand-mark" id="mark"></span> Trans<small>fado</small></a>
    <a class="side-link" data-page="overview"><span class="ico">▣</span><span data-i18n="dash.overview">Overview</span></a>
    <a class="side-link" data-page="payments"><span class="ico">💳</span><span data-i18n="dash.payments">Payments</span></a>
    <a class="side-link" data-page="links"><span class="ico">🔗</span><span data-i18n="dash.links">Payment Links</span></a>
    <a class="side-link" data-page="subscriptions"><span class="ico">🔁</span><span data-i18n="dash.subscriptions">Subscriptions</span></a>
    <a class="side-link" data-page="payouts"><span class="ico">🏦</span><span data-i18n="dash.payouts">Payouts</span></a>
    <div class="side-sep"></div>
    <a class="side-link" data-page="developers"><span class="ico">{ }</span><span data-i18n="dash.developers">Developers</span></a>
    <a class="side-link" data-page="settings"><span class="ico">⚙</span><span data-i18n="dash.settings">Settings</span></a>
    <div class="side-foot">
      <div class="side-sep"></div>
      <div class="side-account" id="side-account">…</div>
      <a class="side-link" id="logout-btn"><span class="ico">→</span><span data-i18n="dash.signout">Sign out</span></a>
      <div class="side-account" style="padding-top:6px;font-size:11.5px">
        <a href="/legal/terms" target="_blank" style="color:var(--text-dim)">Terms</a> ·
        <a href="/legal/privacy" target="_blank" style="color:var(--text-dim)">Privacy</a>
      </div>
    </div>
  </nav>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Overview</h1>
      <div class="row" style="align-items:center;gap:10px">
        <button class="icon-btn" id="cmdk-btn" title="Search (⌘K)" aria-label="Command palette">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-btn" id="notif-btn" title="Notifications" aria-label="Notifications" style="position:relative">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="notif-dot" class="hidden" style="position:absolute;top:7px;right:8px;width:8px;height:8px;border-radius:50%;background:var(--negative);border:2px solid var(--surface-2)"></span>
        </button>
        <span id="topctl"></span>
        <button class="btn btn-primary btn-sm" id="quick-charge"><span data-i18n="dash.newPayment">New payment</span></button>
      </div>
    </div>
    <div class="content">
      <section class="page" id="page-overview"></section>
      <section class="page" id="page-payments"></section>
      <section class="page" id="page-links"></section>
      <section class="page" id="page-subscriptions"></section>
      <section class="page" id="page-payouts"></section>
      <section class="page" id="page-developers"></section>
      <section class="page" id="page-settings"></section>
    </div>
  </div>
</div>
<script src="/js/common.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
